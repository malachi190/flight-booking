version: '3'

tasks:
  build:
    cmds:
      - go build -o bin/api ./cmd/api

  docker-up:
    cmds:
      - docker compose up

  docker-down:
    cmds:
      - docker compose down

  docker-logs:
    cmds:
      - docker compose logs -f api

  docker-build:
    cmds:
      - docker compose build

  # Migrations run inside Docker network using the postgres container
  migrate-up:
    cmds:
      - docker exec flight_api goose -dir internal/db/migrations postgres "postgres://admin:1234@postgres:5432/flightbooking?sslmode=disable" up

  migrate-down:
    cmds:
      - docker exec flight_api goose -dir internal/db/migrations postgres "postgres://admin:1234@postgres:5432/flightbooking?sslmode=disable" down

  migrate-status:
    cmds:
      - docker exec flight_api goose -dir internal/db/migrations postgres "postgres://admin:1234@postgres:5432/flightbooking?sslmode=disable" status

  migrate-create:
    desc: "Create a new migration: task migrate-create -- migration_name"
    cmds:
      - goose -dir internal/db/migrations create {{.CLI_ARGS}} sql
      
  seed:
    cmds:
      - docker exec flight_api go run cmd/seed/main.go

  sqlc:
    cmds:
      - sqlc generate -f sqlc.yaml

  test:
    cmds:
      - go test -v ./...